<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>djch portal</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><text y='20' font-size='20'>✦</text></svg>">
  <link rel="stylesheet" href="assets/app.css?v=8">
  <style>
    .layout { display: grid; grid-template-columns: 264px 1fr; min-height: 100dvh; }

    /* sidebar — floating glass rail */
    .sidebar {
      position: sticky; top: 0; align-self: start; height: 100dvh;
      display: flex; flex-direction: column; gap: 4px; padding: 20px 14px;
      background: var(--sidebar); border-right: 1px solid var(--sidebar-border);
      backdrop-filter: blur(var(--glass-blur)); -webkit-backdrop-filter: blur(var(--glass-blur));
    }
    .brand { display: flex; align-items: center; gap: 11px; padding: 4px 8px 6px; }
    .brand .logo {
      display: inline-flex; align-items: center; justify-content: center;
      width: 38px; height: 38px; border-radius: 11px; color: #fff;
      background: var(--grad); box-shadow: 0 4px 18px -4px color-mix(in srgb, var(--primary) 60%, transparent);
    }
    .brand .logo .ic { width: 21px; height: 21px; }
    .brand .bn { display: flex; flex-direction: column; line-height: 1.15; }
    .brand .bn b { font-family: var(--font-display); font-weight: 700; font-size: 16.5px; letter-spacing: .02em; }
    .brand .bn span { font-family: var(--font-mono); font-size: 10px; color: var(--muted-foreground); letter-spacing: .18em; text-transform: uppercase; }
    .nav-label {
      font-family: var(--font-mono); font-size: 10px; font-weight: 500; letter-spacing: .22em;
      text-transform: uppercase; color: var(--muted-foreground); padding: 18px 8px 7px;
    }
    .nav-item {
      display: flex; align-items: center; gap: 11px; padding: 9px 11px; min-height: 40px;
      border-radius: 11px; color: var(--sidebar-foreground); font-size: 13.5px; font-weight: 500;
      cursor: pointer; position: relative; transition: background .14s, color .14s, box-shadow .2s;
    }
    .nav-item .ic { width: 17px; height: 17px; color: var(--nc, var(--muted-foreground)); transition: filter .2s; }
    .nav-item .n-count { margin-left: auto; font-family: var(--font-mono); font-size: 10.5px; color: var(--muted-foreground); }
    .nav-item:hover { background: color-mix(in srgb, var(--nc, var(--primary)) 11%, transparent); }
    .nav-item.active {
      background: color-mix(in srgb, var(--nc, var(--primary)) 15%, transparent);
      color: var(--foreground); font-weight: 600;
      box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--nc, var(--primary)) 28%, transparent);
    }
    .nav-item.active::before {
      content: ""; position: absolute; left: -14px; top: 9px; bottom: 9px; width: 3px; border-radius: 3px;
      background: var(--nc, var(--primary)); box-shadow: 0 0 10px var(--nc, var(--primary));
    }
    .nav-item.active .ic { filter: drop-shadow(0 0 6px color-mix(in srgb, var(--nc, var(--primary)) 70%, transparent)); }
    .nav-item.dim { opacity: .38; }
    .sb-foot { margin-top: auto; display: flex; align-items: center; gap: 8px; padding-top: 14px; border-top: 1px solid var(--sidebar-border); }
    .pill {
      flex: 1; display: flex; align-items: center; gap: 8px; padding: 9px 12px; border-radius: 11px;
      background: var(--card); border: 1px solid var(--border);
      font-family: var(--font-mono); font-size: 11px; color: var(--muted-foreground);
    }
    .pill .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--d-virtualization); box-shadow: 0 0 9px var(--d-virtualization); flex: none; animation: pulse 2.4s ease-in-out infinite; }
    @keyframes pulse { 50% { opacity: .45; } }
    #logout-btn:hover { border-color: var(--destructive); color: var(--destructive); box-shadow: 0 0 14px color-mix(in srgb, var(--destructive) 35%, transparent); }

    /* main */
    .main { min-width: 0; }
    .topbar {
      position: sticky; top: 0; z-index: 10; display: flex; align-items: center; gap: 16px;
      padding: 13px 28px; background: color-mix(in srgb, var(--background) 62%, transparent);
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }
    .topbar .path { font-family: var(--font-mono); font-size: 12.5px; color: var(--muted-foreground); }
    .topbar .path b { color: var(--foreground); font-weight: 500; }
    .topbar .grow { flex: 1; }
    .search { position: relative; width: min(380px, 42vw); }
    .search .ic { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; color: var(--muted-foreground); pointer-events: none; }
    .search input {
      width: 100%; height: 40px; padding: 0 14px 0 38px; border-radius: 11px; font: inherit; font-size: 13.5px;
      background: var(--input); border: 1px solid var(--border); color: var(--foreground); outline: none;
      backdrop-filter: blur(var(--glass-blur)); -webkit-backdrop-filter: blur(var(--glass-blur));
      transition: border-color .15s, box-shadow .15s;
    }
    .search input::placeholder { color: var(--muted-foreground); }
    .search input:focus {
      border-color: var(--secondary);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--secondary) 22%, transparent), 0 0 18px color-mix(in srgb, var(--secondary) 22%, transparent);
    }
    .content { padding: 30px 32px 72px; max-width: 1220px; }

    /* hero — compact single row: title block left, stat chips right */
    .hero { margin: 2px 2px 4px; display: flex; align-items: flex-end; gap: 18px; flex-wrap: wrap; }
    .hero .lead { min-width: 0; }
    .hero .kicker {
      font-family: var(--font-mono); font-size: 10px; letter-spacing: .3em; text-transform: uppercase;
      color: var(--secondary); display: flex; align-items: center; gap: 10px;
    }
    .hero .kicker::before { content: ""; width: 26px; height: 1px; background: var(--secondary); box-shadow: 0 0 8px var(--secondary); }
    .hero h2 {
      margin: 6px 0 0; font-family: var(--font-sans); font-size: 22px;
      font-weight: 700; letter-spacing: -.01em; line-height: 1.2;
    }
    .hero h2 .grad {
      background: var(--grad); -webkit-background-clip: text; background-clip: text; color: transparent;
      filter: drop-shadow(0 0 22px color-mix(in srgb, var(--primary) 28%, transparent));
    }
    .hero p { margin: 3px 0 0; color: var(--muted-foreground); font-size: 13px; max-width: 560px; }
    .stats { display: flex; flex-wrap: wrap; gap: 8px; margin: 0 0 2px auto; }
    .stat {
      display: flex; align-items: baseline; gap: 7px; padding: 5px 11px; border-radius: 11px;
      background: var(--card); border: 1px solid var(--border);
      backdrop-filter: blur(var(--glass-blur)); -webkit-backdrop-filter: blur(var(--glass-blur));
    }
    .stat b { font-family: var(--font-display); font-size: 14px; font-weight: 700; color: var(--sc, var(--secondary)); }
    .stat span { font-family: var(--font-mono); font-size: 10.5px; letter-spacing: .12em; text-transform: uppercase; color: var(--muted-foreground); }

    footer { margin: 48px 2px 0; color: var(--muted-foreground); font-size: 11.5px; font-family: var(--font-mono); opacity: .8; }

    /* scrim must be fixed (not a grid item) so it never occupies a column */
    .scrim { position: fixed; inset: 0; background: rgba(2, 4, 12, .55); z-index: 35; opacity: 0; pointer-events: none; transition: opacity .2s; backdrop-filter: blur(3px); }
    .scrim.show { opacity: 1; pointer-events: auto; }
    /* mobile */
    .menu-btn { display: none; }
    @media (max-width: 880px) {
      .layout { grid-template-columns: 1fr; }
      .sidebar {
        position: fixed; z-index: 40; width: 272px; left: 0; top: 0;
        transform: translateX(-100%); transition: transform .22s ease; box-shadow: var(--shadow-md);
        background: color-mix(in srgb, var(--card-solid) 92%, transparent);
      }
      .sidebar.open { transform: none; }
      .menu-btn { display: inline-flex; }
      .content { padding: 22px 18px 64px; }
    }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="bg-noise"></div>

  <div class="layout">
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <span class="logo" id="brand-logo"></span>
        <span class="bn"><b id="brand-name">Djch Portal</b><span>ops deck</span></span>
      </div>
      <div id="nav"></div>
      <div class="sb-foot">
        <div class="pill"><span class="dot"></span> internal sso</div>
        <button class="icon-btn" id="theme-btn" aria-label="Toggle theme"></button>
        <a class="icon-btn" id="logout-btn" href="/outpost.goauthentik.io/sign_out" aria-label="Sign out" title="Sign out"></a>
      </div>
    </aside>
    <div class="scrim" id="scrim"></div>

    <main class="main">
      <div class="topbar">
        <button class="icon-btn menu-btn" id="menu-btn" aria-label="Menu"></button>
        <div class="grow"></div>
        <div class="search">
          <span id="search-ic"></span>
          <input id="q" type="search" placeholder="Search visualizations & systems…" autocomplete="off" aria-label="Search">
        </div>
      </div>

      <div class="content">
        <div class="hero reveal" style="--i:0">
          <div class="lead">
            <div class="kicker">internal ops deck</div>
            <h2 id="lead-title"></h2>
            <p id="lead-sub"></p>
          </div>
          <div class="stats" id="stats"></div>
        </div>

        <section class="section reveal" id="sec-viz" style="--i:2">
          <div class="sec-title"><h2>Visualizations</h2></div>
          <div class="grid" id="viz-grid"></div>
          <div class="domain-empty" id="viz-empty" style="display:none"></div>
        </section>

        <section class="section reveal" id="systems" style="--i:3">
          <div class="sec-title"><h2>Systems</h2></div>
          <div class="grid" id="sys-grid"></div>
        </section>

        <footer>portal.djch.one · add a page = edit portal.json + drop html into viz/ + git push</footer>
      </div>
    </main>
  </div>

  <script src="assets/portal.js?v=7"></script>
  <script>
    const $ = s => document.querySelector(s);
    const reduced = matchMedia('(prefers-reduced-motion: reduce)').matches;

    /* ===== animated background (multi-mode engine in portal.js) ===== */
    initBackground();

    /* ===== chrome ===== */
    $('#brand-logo').innerHTML = svgIcon('sparkle');
    $('#logout-btn').innerHTML = svgIcon('log-out');
    // 彻底注销:先杀本应用 outpost 会话,再终止 Authentik SSO 主会话(否则点 Sign in 会被静默登回)
    $('#logout-btn').onclick = async e => {
      e.preventDefault();
      try { await fetch('/outpost.goauthentik.io/sign_out', { redirect: 'manual', cache: 'no-store' }); } catch (_) {}
      location.href = 'https://auth.djch.one/flows/-/default/invalidation/';
    };
    $('#search-ic').innerHTML = svgIcon('search');
    const themeBtn = $('#theme-btn');
    const paint = () => themeBtn.innerHTML = themeIcon();
    paint(); themeBtn.onclick = () => { toggleTheme(); paint(); };

    // mobile drawer
    const sb = $('#sidebar'), scrim = $('#scrim');
    const closeNav = () => { sb.classList.remove('open'); scrim.classList.remove('show'); };
    $('#menu-btn').innerHTML = svgIcon('grid');
    $('#menu-btn').onclick = () => { sb.classList.add('open'); scrim.classList.add('show'); };
    scrim.onclick = closeNav;

    /* ===== 3D tilt ===== */
    const tilt = card => {
      if (reduced) return;
      card.addEventListener('pointermove', e => {
        if (e.pointerType !== 'mouse') return;
        if (!document.documentElement.classList.contains('dark')) return; // light = enterprise mode, no tilt
        const r = card.getBoundingClientRect();
        const x = (e.clientX - r.left) / r.width, y = (e.clientY - r.top) / r.height;
        card.style.setProperty('--rx', ((0.5 - y) * 9).toFixed(2) + 'deg');
        card.style.setProperty('--ry', ((x - 0.5) * 12).toFixed(2) + 'deg');
        card.style.setProperty('--mx', (x * 100).toFixed(1) + '%');
        card.style.setProperty('--my', (y * 100).toFixed(1) + '%');
      });
      card.addEventListener('pointerleave', () => {
        card.style.setProperty('--rx', '0deg');
        card.style.setProperty('--ry', '0deg');
      });
    };

    loadPortal().then(data => {
      $('#brand-name').textContent = data.brand || 'djch portal';
      const t = data.title || 'Infrastructure-Knowledge';
      $('#lead-title').innerHTML = '<span class="grad">' + t + '</span>';
      $('#lead-sub').textContent = data.subtitle || '';
      document.title = data.brand || 'djch portal';
      const dom = data.domains || {};
      const viz = data.viz || [], sys = data.system || [];
      const keys = Object.keys(dom);

      // hero stats
      $('#stats').innerHTML =
        '<div class="stat" style="--sc:var(--d-network)"><b>' + viz.length + '</b><span>visualizations</span></div>' +
        '<div class="stat" style="--sc:var(--d-k8s)"><b>' + sys.length + '</b><span>systems</span></div>' +
        '<div class="stat" style="--sc:var(--d-monitoring)"><b>' + keys.length + '</b><span>domains</span></div>';

      // sidebar nav — domain FILTERS (All + every declared domain), not anchors
      const nav = $('#nav');
      nav.innerHTML = '<div class="nav-label">Domains</div>';
      let domFilter = 'all';
      const mkFilter = (filter, icon, label, count, color) => {
        const el = document.createElement('a');
        el.className = 'nav-item'; el.href = '#'; el.dataset.filter = filter;
        if (color) el.style.setProperty('--nc', color);
        if (!count && filter !== 'all') el.classList.add('dim');
        el.innerHTML = svgIcon(icon) + '<span>' + label + '</span><span class="n-count">' + (count || '·') + '</span>';
        el.onclick = e => {
          e.preventDefault();
          domFilter = filter;
          nav.querySelectorAll('.nav-item').forEach(n => n.classList.toggle('active', n === el));
          applyFilter(); closeNav();
        };
        nav.appendChild(el);
        return el;
      };
      mkFilter('all', 'grid', 'All', viz.length).classList.add('active');
      keys.forEach(k => mkFilter(k, dom[k].icon, dom[k].label,
        viz.filter(v => v.domain === k).length, 'var(--d-' + k + ')'));
      nav.insertAdjacentHTML('beforeend', '<div class="nav-label">Directory</div>');
      const sysNav = document.createElement('a');
      sysNav.className = 'nav-item'; sysNav.href = '#systems';
      sysNav.innerHTML = svgIcon('grid') + '<span>Systems</span><span class="n-count">' + sys.length + '</span>';
      sysNav.onclick = closeNav; nav.appendChild(sysNav);

      // visualizations — ONE unified grid, domain encoded as card accent + badge
      // (render in declared-domain order so same-domain cards cluster)
      const grid = $('#viz-grid');
      const ordered = keys.flatMap(k => viz.filter(v => v.domain === k));
      let ci = 0;
      ordered.forEach(v => {
        const a = document.createElement('a');
        a.className = 'card reveal'; a.style.setProperty('--dc', 'var(--d-' + v.domain + ')');
        a.style.setProperty('--i', 2 + (ci++ % 6));
        a.dataset.domain = v.domain;
        a.href = 'viewer.html?p=' + encodeURIComponent(v.path) + '&t=' + encodeURIComponent(v.title) + '&d=' + v.domain;
        a.dataset.search = (v.title + ' ' + (v.desc || '') + ' ' + dom[v.domain].label).toLowerCase();
        a.innerHTML = '<span class="tile">' + svgIcon(v.icon) + '</span>' +
          '<span class="body"><span class="title">' + v.title + '</span>' +
          '<span class="desc">' + (v.desc || '') + '</span>' +
          '<span class="meta"><span class="badge">' + dom[v.domain].label + '</span></span></span>';
        tilt(a); grid.appendChild(a);
      });

      // systems
      const sg = $('#sys-grid');
      sys.forEach(s => {
        const a = document.createElement('a');
        a.className = 'card reveal'; a.href = s.url; a.target = '_blank'; a.rel = 'noopener';
        a.style.setProperty('--dc', 'var(--secondary)');
        a.style.setProperty('--i', 3 + (ci++ % 6));
        a.dataset.search = (s.title + ' ' + (s.desc || '')).toLowerCase();
        a.innerHTML = '<span class="tile">' + svgIcon(s.icon) + '</span>' +
          '<span class="body"><span class="title">' + s.title + ' ' + svgIcon('external', 'ic') + '</span>' +
          '<span class="desc">' + (s.desc || '') + '</span>' +
          '<span class="meta"><span class="host">' + (s.url || '').replace(/^https?:\/\//, '').replace(/\/$/, '') + '</span></span></span>';
        // shrink the inline external icon
        a.querySelector('.title svg').style.cssText = 'width:13px;height:13px;color:var(--muted-foreground)';
        tilt(a); sg.appendChild(a);
      });

      // domain filter ∩ search — one pass over both grids
      const q = $('#q');
      const empty = $('#viz-empty');
      function applyFilter() {
        const term = q.value.trim().toLowerCase();
        let shown = 0;
        grid.querySelectorAll('.card').forEach(c => {
          const ok = (domFilter === 'all' || c.dataset.domain === domFilter) &&
                     (!term || (c.dataset.search || '').includes(term));
          c.style.display = ok ? '' : 'none';
          if (ok) shown++;
        });
        empty.textContent = term
          ? 'no visualizations match "' + term + '"'
          : 'no visualizations in this domain yet — add one in portal.json';
        empty.style.display = shown ? 'none' : '';
        sg.querySelectorAll('.card').forEach(c => {
          c.style.display = (!term || (c.dataset.search || '').includes(term)) ? '' : 'none';
        });
      }
      q.addEventListener('input', applyFilter);
    });
  </script>
</body>
</html>
