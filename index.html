<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>djch portal</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><text y='20' font-size='20'>✦</text></svg>">
  <link rel="stylesheet" href="assets/app.css">
  <style>
    .layout { display: grid; grid-template-columns: 256px 1fr; min-height: 100dvh; }

    /* sidebar */
    .sidebar {
      position: sticky; top: 0; align-self: start; height: 100dvh;
      display: flex; flex-direction: column; gap: 4px; padding: 18px 14px;
      background: var(--sidebar); border-right: 1px solid var(--sidebar-border);
    }
    .brand { display: flex; align-items: center; gap: 10px; padding: 6px 8px 16px; font-weight: 700; font-size: 17px; }
    .brand .logo { color: var(--primary); display: inline-flex; }
    .brand .logo .ic { width: 22px; height: 22px; }
    .nav-label { font-size: 10.5px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; color: var(--muted-foreground); padding: 14px 8px 6px; }
    .nav-item {
      display: flex; align-items: center; gap: 11px; padding: 9px 10px; min-height: 40px;
      border-radius: 9px; color: var(--sidebar-foreground); font-size: 14px; font-weight: 500;
      cursor: pointer; position: relative; transition: background .14s, color .14s;
    }
    .nav-item .ic { width: 18px; height: 18px; color: var(--muted-foreground); transition: color .14s; }
    .nav-item:hover { background: color-mix(in srgb, var(--primary) 12%, transparent); }
    .nav-item.active { background: color-mix(in srgb, var(--primary) 20%, transparent); color: var(--foreground); font-weight: 600; }
    .nav-item.active::before { content: ""; position: absolute; left: 0; top: 8px; bottom: 8px; width: 3px; border-radius: 3px; background: var(--primary); }
    .nav-item.active .ic { color: color-mix(in srgb, var(--primary) 55%, var(--foreground)); }
    .sb-foot { margin-top: auto; display: flex; align-items: center; gap: 8px; padding-top: 12px; border-top: 1px solid var(--sidebar-border); }
    .pill { flex: 1; display: flex; align-items: center; gap: 8px; padding: 8px 11px; border-radius: 9px; background: var(--card); border: 1px solid var(--border); font-size: 12.5px; color: var(--muted-foreground); }
    .pill .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--d-k8s); box-shadow: 0 0 7px var(--d-k8s); flex: none; }

    /* main */
    .main { min-width: 0; }
    .topbar {
      position: sticky; top: 0; z-index: 10; display: flex; align-items: center; gap: 16px;
      padding: 14px 28px; background: color-mix(in srgb, var(--background) 86%, transparent);
      backdrop-filter: blur(10px); border-bottom: 1px solid var(--border);
    }
    .topbar h1 { margin: 0; font-size: 17px; font-weight: 600; }
    .topbar .grow { flex: 1; }
    .search { position: relative; width: min(360px, 42vw); }
    .search .ic { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); width: 17px; height: 17px; color: var(--muted-foreground); pointer-events: none; }
    .search input {
      width: 100%; height: 40px; padding: 0 14px 0 38px; border-radius: 10px; font: inherit; font-size: 14px;
      background: var(--card); border: 1px solid var(--border); color: var(--foreground); outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    .search input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px color-mix(in srgb, var(--ring) 35%, transparent); }
    .content { padding: 24px 28px 64px; max-width: 1180px; }
    .lead { margin: 4px 2px 6px; }
    .lead h2 { margin: 0; font-size: 22px; font-weight: 700; letter-spacing: -.3px; }
    .lead p { margin: 5px 0 0; color: var(--muted-foreground); font-size: 14px; }
    .empty-note { color: var(--muted-foreground); font-size: 13px; padding: 8px 2px; }
    footer { margin: 40px 2px 0; color: var(--muted-foreground); font-size: 12px; font-family: var(--font-mono); }

    /* scrim must be fixed (not a grid item) so it never occupies a column */
    .scrim { position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 35; opacity: 0; pointer-events: none; transition: opacity .2s; }
    .scrim.show { opacity: 1; pointer-events: auto; }
    /* mobile */
    .menu-btn { display: none; }
    @media (max-width: 880px) {
      .layout { grid-template-columns: 1fr; }
      .sidebar {
        position: fixed; z-index: 40; width: 256px; left: 0; top: 0;
        transform: translateX(-100%); transition: transform .22s ease; box-shadow: var(--shadow-md);
      }
      .sidebar.open { transform: none; }
      .menu-btn { display: inline-flex; }
    }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar" id="sidebar">
      <div class="brand"><span class="logo" id="brand-logo"></span><span id="brand-name">djch portal</span></div>
      <div id="nav"></div>
      <div class="sb-foot">
        <div class="pill"><span class="dot"></span> Internal SSO</div>
        <button class="icon-btn" id="theme-btn" aria-label="Toggle theme"></button>
      </div>
    </aside>
    <div class="scrim" id="scrim"></div>

    <main class="main">
      <div class="topbar">
        <button class="icon-btn menu-btn" id="menu-btn" aria-label="Menu"></button>
        <h1>Dashboard</h1>
        <div class="grow"></div>
        <div class="search">
          <span id="search-ic"></span>
          <input id="q" type="search" placeholder="Search visualizations & systems…" autocomplete="off" aria-label="Search">
        </div>
      </div>

      <div class="content">
        <div class="lead">
          <h2 id="lead-title">Internal technical portal</h2>
          <p id="lead-sub">Visualization library + system directory</p>
        </div>

        <section class="section" id="sec-viz">
          <div class="sec-title"><h2>Visualizations</h2></div>
          <div id="viz-groups"></div>
        </section>

        <section class="section" id="systems">
          <div class="sec-title"><h2>Systems</h2></div>
          <div class="grid" id="sys-grid"></div>
        </section>

        <footer>portal.djch.one · add a page = edit portal.json + drop html into viz/ + git push</footer>
      </div>
    </main>
  </div>

  <script src="assets/portal.js"></script>
  <script>
    const $ = s => document.querySelector(s);
    $('#brand-logo').innerHTML = svgIcon('sparkle');
    $('#search-ic').innerHTML = svgIcon('search');
    const themeBtn = $('#theme-btn');
    const paint = () => themeBtn.innerHTML = themeIcon();
    paint(); themeBtn.onclick = () => { toggleTheme(); paint(); };

    // mobile drawer
    const sb = $('#sidebar'), scrim = $('#scrim');
    const closeNav = () => { sb.classList.remove('open'); scrim.classList.remove('show'); };
    $('#menu-btn').innerHTML = svgIcon('grid');
    $('#menu-btn').onclick = () => { sb.classList.add('open'); scrim.classList.add('show'); };
    scrim.onclick = closeNav;

    loadPortal().then(data => {
      $('#brand-name').textContent = data.brand || 'djch portal';
      $('#lead-title').textContent = data.title || '';
      $('#lead-sub').textContent = data.subtitle || '';
      document.title = data.brand || 'djch portal';
      const dom = data.domains || {};

      // domains that actually have viz pages, in declared order
      const order = Object.keys(dom);
      const used = order.filter(k => (data.viz || []).some(v => v.domain === k));

      // sidebar nav
      const nav = $('#nav');
      nav.innerHTML = '<div class="nav-label">Visualizations</div>';
      used.forEach(k => {
        const el = document.createElement('a');
        el.className = 'nav-item'; el.href = '#dom-' + k; el.dataset.spy = 'dom-' + k;
        el.innerHTML = svgIcon(dom[k].icon) + '<span>' + dom[k].label + '</span>';
        el.onclick = closeNav; nav.appendChild(el);
      });
      nav.insertAdjacentHTML('beforeend', '<div class="nav-label">Directory</div>');
      const sysNav = document.createElement('a');
      sysNav.className = 'nav-item'; sysNav.href = '#systems'; sysNav.dataset.spy = 'systems';
      sysNav.innerHTML = svgIcon('grid') + '<span>Systems</span>';
      sysNav.onclick = closeNav; nav.appendChild(sysNav);

      // viz groups
      const groups = $('#viz-groups');
      used.forEach(k => {
        const items = (data.viz || []).filter(v => v.domain === k);
        const head = document.createElement('div');
        head.className = 'domain-head'; head.id = 'dom-' + k; head.style.setProperty('--dc', 'var(--d-' + k + ')');
        head.innerHTML = '<span class="di">' + svgIcon(dom[k].icon) + '</span><h3>' + dom[k].label +
          '</h3><span class="count">' + items.length + '</span>';
        groups.appendChild(head);
        const grid = document.createElement('div'); grid.className = 'grid';
        items.forEach(v => {
          const a = document.createElement('a');
          a.className = 'card'; a.style.setProperty('--dc', 'var(--d-' + v.domain + ')');
          a.href = 'viewer.html?p=' + encodeURIComponent(v.path) + '&t=' + encodeURIComponent(v.title) + '&d=' + v.domain;
          a.dataset.search = (v.title + ' ' + (v.desc || '') + ' ' + dom[v.domain].label).toLowerCase();
          a.innerHTML = '<span class="tile">' + svgIcon(v.icon) + '</span>' +
            '<span class="body"><span class="title">' + v.title + '</span>' +
            '<span class="desc">' + (v.desc || '') + '</span>' +
            '<span class="meta"><span class="badge">' + dom[v.domain].label + '</span></span></span>';
          grid.appendChild(a);
        });
        groups.appendChild(grid);
      });

      // systems
      const sg = $('#sys-grid');
      (data.system || []).forEach(s => {
        const a = document.createElement('a');
        a.className = 'card'; a.href = s.url; a.target = '_blank'; a.rel = 'noopener';
        a.style.setProperty('--dc', 'var(--secondary)');
        a.dataset.search = (s.title + ' ' + (s.desc || '')).toLowerCase();
        a.innerHTML = '<span class="tile">' + svgIcon(s.icon) + '</span>' +
          '<span class="body"><span class="title">' + s.title + ' ' + svgIcon('external', 'ic') + '</span>' +
          '<span class="desc">' + (s.desc || '') + '</span>' +
          '<span class="meta"><span class="host">' + (s.url || '').replace(/^https?:\/\//, '').replace(/\/$/, '') + '</span></span></span>';
        // shrink the inline external icon
        a.querySelector('.title svg').style.cssText = 'width:13px;height:13px;color:var(--muted-foreground)';
        sg.appendChild(a);
      });

      // search filter (hides empty groups)
      const q = $('#q');
      q.addEventListener('input', () => {
        const term = q.value.trim().toLowerCase();
        document.querySelectorAll('.card').forEach(c => {
          c.style.display = (!term || (c.dataset.search || '').includes(term)) ? '' : 'none';
        });
        document.querySelectorAll('.domain-head').forEach(h => {
          const grid = h.nextElementSibling;
          const any = [...grid.children].some(c => c.style.display !== 'none');
          h.style.display = any ? '' : 'none'; grid.style.display = any ? '' : 'none';
        });
      });

      // scrollspy
      const spies = [...document.querySelectorAll('.nav-item')];
      const byId = id => spies.find(s => s.dataset.spy === id);
      const targets = [...document.querySelectorAll('[id^="dom-"], #systems')];
      const obs = new IntersectionObserver(ents => {
        ents.forEach(e => {
          if (e.isIntersecting) {
            spies.forEach(s => s.classList.remove('active'));
            const n = byId(e.target.id); if (n) n.classList.add('active');
          }
        });
      }, { rootMargin: '-20% 0px -70% 0px' });
      targets.forEach(t => obs.observe(t));
      if (spies[0]) spies[0].classList.add('active');
    });
  </script>
</body>
</html>
