<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AIDC Rack SVG Prototype</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800&display=swap');

    :root {
      --bg: #07090d;
      --panel: #101317;
      --panel-2: #141922;
      --line: #2a3341;
      --muted: #7f8a9b;
      --text: #f4efe8;
      --amber: #f59e0b;
      --green: #22c55e;
      --teal: #2dd4bf;
      --red: #ef4444;
      --violet: #7c8cff;
      --orange: #f97316;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
      background:
        linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px),
        linear-gradient(0deg, rgba(255,255,255,0.025) 1px, transparent 1px),
        radial-gradient(circle at 64% 18%, rgba(45, 212, 191, 0.16), transparent 34%),
        radial-gradient(circle at 42% 72%, rgba(245, 158, 11, 0.1), transparent 30%),
        var(--bg);
      background-size: 56px 56px, 56px 56px, auto, auto, auto;
      color: var(--text);
      font-family: "Inter", "Inter Fallback", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: geometricPrecision;
    }

    .page {
      display: grid;
      grid-template-columns: 318px minmax(0, 1fr);
      gap: 20px;
      height: 100vh;
      padding: 22px;
    }

    aside {
      display: flex;
      flex-direction: column;
      gap: 14px;
      min-width: 0;
    }

    .title {
      margin: 0 0 16px;
      font-size: 19px;
      font-weight: 760;
      letter-spacing: 0;
      color: #f4efe8;
      text-shadow: 0 0 24px rgba(255, 224, 194, 0.14);
    }

    .card {
      border: 1px solid rgba(255, 224, 194, 0.1);
      position: relative;
      overflow: hidden;
      border-radius: 14px;
      background:
        linear-gradient(135deg, rgba(255,224,194,0.08), rgba(255,255,255,0.025) 36%, rgba(52,211,153,0.025)),
        linear-gradient(180deg, rgba(25, 25, 25, 0.72), rgba(12, 12, 12, 0.88));
      box-shadow: inset 0 1px 0 rgba(255,224,194,0.08), 0 24px 70px rgba(0,0,0,0.28);
      backdrop-filter: blur(16px);
      padding: 18px;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, rgba(255,224,194,0.1), transparent 28%, transparent 72%, rgba(52,211,153,0.06));
      pointer-events: none;
    }

    .card h2 {
      margin: 0;
      color: #f4efe8;
      font-size: 13px;
      font-weight: 760;
      letter-spacing: 0.16em;
    }

    .row {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      padding: 7px 0;
      color: #cfc8be;
      font-size: 14px;
      font-weight: 650;
    }

    .row span:first-child {
      color: #a99f92;
    }

    .util {
      height: 10px;
      margin-top: 16px;
      overflow: hidden;
      border-radius: 99px;
      background: #070707;
      box-shadow: inset 0 0 0 1px rgba(255,224,194,0.06);
    }

    .card-head {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .badge {
      border: 1px solid rgba(255,224,194,0.12);
      border-radius: 999px;
      background: rgba(255,224,194,0.055);
      color: #cfc8be;
      padding: 4px 8px;
      font-family: "Inter", "Inter Fallback", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 11px;
      font-weight: 700;
    }

    .metric {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 10px;
    }

    .metric strong {
      color: #f4efe8;
      font-family: "Inter", "Inter Fallback", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 0;
    }

    .metric span {
      color: #a99f92;
      font-size: 13px;
      font-weight: 700;
    }

    .card-body {
      position: relative;
      z-index: 1;
    }

    .power-split {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 10px;
    }

    .power-pill {
      border: 1px solid rgba(255,224,194,0.08);
      border-radius: 10px;
      background: rgba(0, 0, 0, 0.28);
      padding: 10px;
    }

    .power-pill span {
      display: block;
      color: #a99f92;
      font-size: 11px;
      font-weight: 760;
      letter-spacing: 0.12em;
    }

    .power-pill strong {
      display: block;
      margin-top: 5px;
      color: #f4efe8;
      font-family: "Inter", "Inter Fallback", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 16px;
      font-weight: 700;
    }

    .util div {
      width: 50%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #f8d13d, #34d399 42%, #f97316);
      box-shadow: 0 0 22px rgba(45, 212, 191, 0.35);
    }

    .legend {
      display: grid;
      gap: 14px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 12px;
      color: #cdd3dc;
      font-size: 15px;
      font-weight: 680;
    }

    .dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--c);
      box-shadow: 0 0 16px var(--c);
    }

    main {
      min-width: 0;
      overflow: hidden;
      border: 1px solid rgba(255, 224, 194, 0.1);
      border-radius: 18px;
      background:
        linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px),
        linear-gradient(0deg, rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(135deg, rgba(255,224,194,0.045), rgba(255,255,255,0.015) 34%, rgba(52,211,153,0.028)),
        linear-gradient(180deg, rgba(25, 25, 25, 0.86), rgba(9, 9, 9, 0.96));
      background-size: 34px 34px, 34px 34px, auto;
      box-shadow: inset 0 1px 0 rgba(255,224,194,0.05), 0 28px 90px rgba(0,0,0,0.38);
      backdrop-filter: blur(16px);
      padding: 16px;
    }

    svg {
      width: 100%;
      height: 100%;
      display: block;
      font-family: "Inter", "Inter Fallback", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
    }

    svg text {
      paint-order: stroke fill;
      stroke: rgba(7, 9, 13, 0.16);
      stroke-width: 0.16px;
    }

    .rack-label {
      fill: #a99f92;
      font-size: 13px;
      font-weight: 760;
      letter-spacing: 0.34em;
      font-family: "Inter", "Inter Fallback", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .u-label {
      fill: #7d7468;
      font-size: 10px;
      font-weight: 650;
      font-family: "Inter", "Inter Fallback", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .host text {
      pointer-events: none;
    }

    .host {
      cursor: pointer;
      transition: transform 180ms ease;
    }

    .host:hover .host-shell {
      stroke: #f8fafc;
      stroke-width: 2;
      filter: drop-shadow(0 0 12px rgba(148, 163, 184, 0.42));
    }

    .pulse {
      animation: pulse 2.4s ease-in-out infinite;
    }

    .scan {
      animation: scan 5s linear infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.68; }
      50% { opacity: 1; }
    }

    @keyframes scan {
      from { transform: translateY(-240px); }
      to { transform: translateY(1240px); }
    }

    @media (max-width: 980px) {
      body {
        overflow: auto;
      }

      .page {
        grid-template-columns: 1fr;
        height: auto;
        min-height: 100vh;
      }

      main {
        height: 900px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <aside>
      <div>
        <h1 class="title">NTServer · 42U · 50% utilized</h1>
      </div>

      <section class="card">
        <div class="card-head">
          <h2>RACK INFO</h2>
          <span class="badge">A01</span>
        </div>
        <div class="metric"><strong>42U</strong><span>cabinet</span></div>
        <div class="card-body">
          <div class="row"><span>Site</span><strong>NTServer</strong></div>
          <div class="row"><span>Position</span><strong>Row A / Bay 01</strong></div>
        </div>
      </section>

      <section class="card">
        <div class="card-head">
          <h2>SPACE</h2>
          <span class="badge">50%</span>
        </div>
        <div class="metric"><strong>21U</strong><span>used</span></div>
        <div class="card-body">
          <div class="row"><span>Free</span><strong style="color: #facc15">21U</strong></div>
          <div class="util"><div></div></div>
        </div>
      </section>

      <section class="card">
        <div class="card-head">
          <h2>PDU POWER</h2>
          <span class="badge">LIVE</span>
        </div>
        <div class="metric"><strong>8.25</strong><span>kW total</span></div>
        <div class="card-body">
          <div class="power-split">
            <div class="power-pill"><span>LEFT</span><strong>4,280W</strong></div>
            <div class="power-pill"><span>RIGHT</span><strong>3,970W</strong></div>
          </div>
        </div>
      </section>

      <section class="card">
        <div class="card-head">
          <h2>FIT HEIGHT</h2>
          <span class="badge">LOCKED</span>
        </div>
        <div class="metric"><strong>1:1</strong><span>42U scale</span></div>
        <div class="card-body">
          <div class="row"><span>Unit pitch</span><strong>27px</strong></div>
          <div class="row"><span>View</span><strong>Front + Rear</strong></div>
        </div>
      </section>
    </aside>

    <main>
      <svg viewBox="0 0 980 1260" role="img" aria-label="Professional rack SVG prototype">
        <defs>
          <linearGradient id="rackShell" x1="0" x2="1" y1="0" y2="1">
            <stop offset="0%" stop-color="#243143" />
            <stop offset="46%" stop-color="#111b27" />
            <stop offset="100%" stop-color="#07111c" />
          </linearGradient>
          <linearGradient id="rail" x1="0" x2="1">
            <stop offset="0%" stop-color="#050b13" />
            <stop offset="48%" stop-color="#18243a" />
            <stop offset="100%" stop-color="#050b13" />
          </linearGradient>
          <linearGradient id="pdu" x1="0" x2="1">
            <stop offset="0%" stop-color="#15261f" />
            <stop offset="48%" stop-color="#24483e" />
            <stop offset="100%" stop-color="#10211c" />
          </linearGradient>
          <linearGradient id="violetUnit" x1="0" x2="1">
            <stop offset="0%" stop-color="#5562db" />
            <stop offset="100%" stop-color="#9066f2" />
          </linearGradient>
          <linearGradient id="tealUnit" x1="0" x2="1">
            <stop offset="0%" stop-color="#0f9f83" />
            <stop offset="100%" stop-color="#1ec6a2" />
          </linearGradient>
          <linearGradient id="orangeUnit" x1="0" x2="1">
            <stop offset="0%" stop-color="#e86113" />
            <stop offset="100%" stop-color="#fb7a1a" />
          </linearGradient>
          <linearGradient id="glassSheen" x1="0" x2="1" y1="0" y2="1">
            <stop offset="0%" stop-color="#ffffff" stop-opacity="0.28" />
            <stop offset="34%" stop-color="#ffffff" stop-opacity="0.08" />
            <stop offset="35%" stop-color="#ffffff" stop-opacity="0" />
            <stop offset="100%" stop-color="#ffffff" stop-opacity="0.04" />
          </linearGradient>
          <linearGradient id="glassEdge" x1="0" x2="1">
            <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18" />
            <stop offset="52%" stop-color="#ffffff" stop-opacity="0" />
            <stop offset="100%" stop-color="#ffffff" stop-opacity="0.16" />
          </linearGradient>
          <filter id="softGlow">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
              <feMergeNode in="blur" />
              <feMergeNode in="SourceGraphic" />
            </feMerge>
          </filter>
        </defs>

        <text x="78" y="27" class="rack-label" text-anchor="middle">LEFT PDU</text>
        <text x="305" y="27" class="rack-label" text-anchor="middle">FRONT</text>
        <text x="730" y="27" class="rack-label" text-anchor="middle">REAR</text>
        <text x="422" y="27" class="rack-label" text-anchor="middle">RIGHT PDU</text>

        <g class="scan" opacity="0.36">
          <rect x="118" y="0" width="810" height="3" fill="#2dd4bf" filter="url(#softGlow)" />
        </g>

        <g id="left-pdu"></g>
        <g id="front-rack"></g>
        <g id="rear-rack"></g>
        <g id="right-pdu"></g>
      </svg>
    </main>
  </div>

  <script>
    const NS = 'http://www.w3.org/2000/svg'
    const totalU = 42
    const rackTop = 66
    const unitH = 27
    const rackH = totalU * unitH
    const rackW = 272
    const railW = 18

    const hosts = [
      { name: 'pve00.djch.one', u: 38, h: 1, type: 'violet', state: 'sel' },
      { name: 'pve01.djch.one', u: 37, h: 1, type: 'violet', state: 'sel' },
      { name: 'pve02.djch.one', u: 36, h: 1, type: 'violet', state: 'sel' },
      { name: 'pve03.djch.one', u: 35, h: 1, type: 'violet', state: 'sel' },
      { name: 'lustre01-poc.djch.one', u: 32, h: 1, type: 'teal', state: 'unknown' },
      { name: 'lustre02-poc.djch.one', u: 31, h: 1, type: 'teal', state: 'unknown' },
      { name: 'k8snode01.djch.one', u: 28, h: 1, type: 'violet', state: 'unknown' },
      { name: 'k8snode02.djch.one', u: 27, h: 1, type: 'violet', state: 'unknown' },
      { name: 'k8snode03.djch.one', u: 26, h: 1, type: 'violet', state: 'unknown' },
      { name: 'nfs01.djch.one', u: 23, h: 2, type: 'orange', state: 'unknown' },
      { name: 'research7.djch.one', u: 20, h: 2, type: 'orange', state: 'sel' },
      { name: 'research8.djch.one', u: 17, h: 2, type: 'orange', state: 'sel' },
      { name: 'research9.djch.one', u: 14, h: 2, type: 'orange', state: 'sel' },
      { name: 'research10.djch.one', u: 11, h: 2, type: 'orange', state: 'sel' },
      { name: 'research11.djch.one', u: 8, h: 2, type: 'orange', state: 'sel' }
    ]

    const stateColor = {
      online: '#22c55e',
      offline: '#ef4444',
      sel: '#f59e0b',
      unknown: '#8aa0bc'
    }

    const typeFill = {
      violet: 'url(#violetUnit)',
      teal: 'url(#tealUnit)',
      orange: 'url(#orangeUnit)'
    }

    const typeStroke = {
      violet: '#9aa7ff',
      teal: '#2dd4bf',
      orange: '#f59e0b'
    }

    function el(tag, attrs = {}, parent) {
      const node = document.createElementNS(NS, tag)
      for (const [key, value] of Object.entries(attrs)) node.setAttribute(key, value)
      if (parent) parent.appendChild(node)
      return node
    }

    function text(value, attrs, parent) {
      const node = el('text', attrs, parent)
      node.textContent = value
      return node
    }

    function rackY(u, h) {
      return rackTop + (totalU - (u + h - 1)) * unitH
    }

    function drawRack(parentId, x, rear = false) {
      const root = document.getElementById(parentId)
      el('rect', { x: x - 10, y: rackTop - 10, width: rackW + 20, height: rackH + 20, rx: 18, fill: 'url(#rackShell)', stroke: '#334155' }, root)
      el('rect', { x: x + 6, y: rackTop + 6, width: rackW - 12, height: rackH - 12, rx: 12, fill: '#0b141f', stroke: '#1f2e40' }, root)
      el('rect', { x, y: rackTop, width: railW, height: rackH, rx: 9, fill: 'url(#rail)', stroke: '#263548' }, root)
      el('rect', { x: x + rackW - railW, y: rackTop, width: railW, height: rackH, rx: 9, fill: 'url(#rail)', stroke: '#263548' }, root)

      for (let i = 0; i < totalU; i++) {
        const u = totalU - i
        const y = rackTop + i * unitH
        el('rect', { x: x + railW + 3, y: y + 1, width: rackW - railW * 2 - 6, height: unitH - 2, rx: 4, fill: i % 2 ? '#101923' : '#121d28', stroke: '#253548', 'stroke-opacity': 0.74 }, root)
        el('circle', { cx: x + 8, cy: y + unitH / 2, r: 1.7, fill: '#718096', opacity: u % 2 ? 0.36 : 0.78 }, root)
        el('circle', { cx: x + rackW - 8, cy: y + unitH / 2, r: 1.7, fill: '#718096', opacity: u % 2 ? 0.36 : 0.78 }, root)
        text(String(u), { x: x - 9, y: y + 16, 'text-anchor': 'end', class: 'u-label' }, root)
        text(String(u), { x: x + rackW + 9, y: y + 16, class: 'u-label' }, root)
      }

      hosts.forEach((host) => drawHost(root, x, host, rear))
    }

    function drawHost(root, x, host, rear) {
      const y = rackY(host.u, host.h)
      const h = host.h * unitH
      const deviceX = x + railW + 5
      const deviceW = rackW - railW * 2 - 10
      const g = el('g', { class: 'host' }, root)
      el('rect', { x: deviceX - 1, y: y + 3, width: deviceW + 2, height: h - 6, rx: 6, fill: '#050b13', opacity: 0.72 }, g)
      el('rect', { class: 'host-shell', x: deviceX, y: y + 4, width: deviceW, height: h - 8, rx: 5, fill: rear ? '#172232' : typeFill[host.type], stroke: typeStroke[host.type], 'stroke-opacity': rear ? 0.5 : 0.95 }, g)
      el('rect', { x: deviceX + 1, y: y + 5, width: deviceW - 2, height: h - 10, rx: 4, fill: 'url(#glassSheen)', opacity: rear ? 0.42 : 0.72 }, g)
      el('rect', { x: deviceX + 1, y: y + 5, width: deviceW - 2, height: h - 10, rx: 4, fill: 'none', stroke: 'url(#glassEdge)', 'stroke-opacity': 0.9 }, g)
      if (!rear) {
        el('path', { d: `M ${deviceX + 6} ${y + 7} H ${deviceX + deviceW - 8} L ${deviceX + deviceW - 42} ${y + Math.max(12, h * 0.42)} H ${deviceX + 6} Z`, fill: '#ffffff', opacity: 0.12 }, g)
        el('rect', { x: deviceX + 16, y: y + h - 11, width: deviceW - 32, height: 2, rx: 1, fill: '#02101a', opacity: 0.34 }, g)
      }
      el('circle', { class: 'pulse', cx: deviceX + 12, cy: y + h / 2, r: 4.2, fill: stateColor[host.state], filter: 'url(#softGlow)' }, g)
      text(host.name, { x: deviceX + 26, y: y + h / 2 + 4, fill: '#f4efe8', 'font-size': host.h > 1 ? 13 : 12, 'font-weight': 760 }, g)

      if (rear) {
        for (let i = 0; i < 4; i++) {
          const active = i < (host.type === 'orange' ? 2 : 4)
          el('rect', { x: deviceX + 12 + i * 16, y: y + h / 2 + 10, width: 10, height: 6, rx: 2, fill: active ? '#143c35' : '#111923', stroke: active ? '#2dd4bf' : typeStroke[host.type], 'stroke-opacity': active ? 0.9 : 0.35 }, g)
          el('line', { x1: deviceX + 17 + i * 16, y1: y + h / 2 + 16, x2: deviceX + 17 + i * 16, y2: y + h - 7, stroke: active ? '#2dd4bf' : '#334155', 'stroke-opacity': active ? 0.42 : 0.18 }, g)
        }
        el('rect', { x: deviceX + deviceW - 28, y: y + h / 2 - 5, width: 18, height: 10, rx: 3, fill: typeStroke[host.type], opacity: 0.45 }, g)
      }
    }

    function drawPdu(parentId, x, side, watts, load) {
      const root = document.getElementById(parentId)
      const loadH = rackH * load
      const loadY = rackTop + rackH - loadH
      text(`${watts.toLocaleString()}W`, { x: x + 17, y: rackTop - 18, 'text-anchor': 'middle', fill: '#f4efe8', 'font-size': 13, 'font-weight': 780 }, root)
      text(`${Math.round(load * 100)}%`, { x: x + 17, y: rackTop - 5, 'text-anchor': 'middle', fill: '#a99f92', 'font-size': 10, 'font-weight': 700 }, root)
      el('rect', { x: x - 5, y: rackTop - 2, width: 44, height: rackH + 4, rx: 14, fill: '#10211c', stroke: '#2dd4bf', 'stroke-opacity': 0.42, filter: 'url(#softGlow)' }, root)
      el('rect', { x: x - 1, y: rackTop + 8, width: 5, height: rackH - 16, rx: 3, fill: '#08110f', stroke: '#2dd4bf', 'stroke-opacity': 0.34 }, root)
      el('rect', { x: x - 1, y: loadY + 8, width: 5, height: Math.max(8, loadH - 16), rx: 3, fill: 'url(#tealUnit)', opacity: 0.9, filter: 'url(#softGlow)' }, root)
      el('rect', { x: x + 9, y: rackTop, width: 16, height: rackH, rx: 7, fill: 'url(#pdu)', stroke: '#182437' }, root)
      for (let i = 0; i < 24; i++) {
        const cy = rackTop + rackH / 24 * i + rackH / 48
        const color = i === 0 ? '#22c55e' : '#8aa0bc'
        el('rect', { x: x + 8, y: cy - 6, width: 18, height: 12, rx: 5, fill: '#101b2d', stroke: '#27374e', 'stroke-opacity': 0.7 }, root)
        el('circle', { class: i === 0 ? 'pulse' : '', cx: x + 17, cy, r: 4, fill: color, filter: 'url(#softGlow)' }, root)
        text(String(i + 1), { x: side === 'left' ? x - 9 : x + 44, y: cy + 3, 'text-anchor': side === 'left' ? 'end' : 'start', fill: '#7d7468', 'font-size': 10, 'font-weight': 650 }, root)
      }
    }

    drawPdu('left-pdu', 60, 'left', 4280, 0.54)
    drawRack('front-rack', 122, false)
    drawRack('rear-rack', 546, true)
    drawPdu('right-pdu', 420, 'right', 3970, 0.49)
  </script>
</body>
</html>
